kind = "web"
previewPath = "/"
title = "Al-Baik Restaurant"
version = "1.0.0"
id = "artifacts/al-baik"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23960

[services.development]
run = "pnpm --filter @workspace/al-baik run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-baik", "run", "build" ]
publicDir = "artifacts/al-baik/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23960"
BASE_PATH = "/"
