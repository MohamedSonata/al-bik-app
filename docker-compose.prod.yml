version: '3.8'

services:
  app:
    image: ${DOCKER_REGISTRY:-mosonata}/al-baik-app:${IMAGE_TAG:-latest}
    container_name: al-baik-app
    ports:
      - "${APP_PORT:-5173}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


